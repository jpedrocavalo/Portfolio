<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jotap Films — Category</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; background: #0a0a0a; color: #f5f1e8; font-family: 'Inter', system-ui, sans-serif; }
  #root { width: 100%; }
  a { color: inherit; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<!-- Traduções compartilhadas + lista de categorias (scripts normais, antes do Babel) -->
<script src="i18n.js"></script>
<script src="categories.js"></script>

<script type="text/babel">
const PALETTE = { bg: '#0a0a0a', fg: '#f5f1e8', muted: '#8a8580', accent: '#7a00d8' };
const FONTS = {
  display: '"Fraunces", serif',
  sans: '"Inter", system-ui, sans-serif',
  mono: '"JetBrains Mono", monospace',
};

// Qual categoria mostrar: lê ?cat=<índice> da URL (vindo da color.html).
const CAT_INDEX = parseInt(new URLSearchParams(location.search).get('cat'), 10);
const CAT = (window.CATEGORIES && window.CATEGORIES[CAT_INDEX])
  || (window.CATEGORIES && window.CATEGORIES[0])
  || { number: '', title: 'Categoria', subtitle: '', intro: '', works: [] };

function Header({ fonts, palette, lang, setLang }) {
  const N = window.I18N[lang].nav;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0,
      padding: '28px 40px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      fontFamily: fonts.mono, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase',
      color: '#fff', zIndex: 10, mixBlendMode: 'difference',
    }}>
      <a href="./index.html" style={{
        fontFamily: fonts.display, fontSize: 16, letterSpacing: '-0.02em',
        textTransform: 'none', fontStyle: 'italic', color: '#fff', textDecoration: 'none',
      }}>Jotap Films</a>

      {/* Toggle de idioma — centralizado no viewport */}
      <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', display: 'flex', alignItems: 'center', gap: 10 }}>
        <span onClick={() => setLang('en')} style={{ cursor: 'pointer', color: lang === 'en' ? palette.accent : 'inherit', opacity: lang === 'en' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>EN</span>
        <span style={{ opacity: 0.4 }}>·</span>
        <span onClick={() => setLang('pt')} style={{ cursor: 'pointer', color: lang === 'pt' ? palette.accent : 'inherit', opacity: lang === 'pt' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>PT</span>
      </div>

      <div style={{ display: 'flex', gap: 32 }}>
        <a href="./reel.html" style={{ color: 'inherit', textDecoration: 'none' }}>{N.reel}</a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
          target="_blank" rel="noopener noreferrer"
          style={{ color: 'inherit', textDecoration: 'none' }}>
          {N.contact}
        </a>
      </div>
    </div>
  );
}

// Card de trabalho — IMAGEM (frame / still de color grading).
// placeholder=true → slot vazio (dimmed).
function WorkCard({ work, fonts, palette, placeholder }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column',
      opacity: placeholder ? 0.35 : 1,
    }}>
      <div style={{
        position: 'relative',
        aspectRatio: '16 / 9',
        background: `linear-gradient(135deg, ${palette.accent}22, ${palette.fg}08)`,
        border: `1px solid ${palette.fg}1a`,
        overflow: 'hidden',
      }}>
        {work && work.imageSrc && (
          <img
            src={work.imageSrc}
            alt={work.title || ''}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }}
          />
        )}
      </div>
      <div style={{ marginTop: 10, display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
        <span style={{ fontFamily: fonts.display, fontStyle: 'italic' }}>
          {work ? work.title : '—'}
        </span>
        <span style={{ fontFamily: fonts.mono, color: palette.muted, fontSize: 10 }}>
          {work ? work.meta : ''}
        </span>
      </div>
    </div>
  );
}

function App() {
  const works = CAT.works || [];
  const hasWorks = works.length > 0;
  // Sem trabalhos ainda → mostra 6 placeholders dimmed.
  const placeholders = [0, 1, 2, 3, 4, 5];

  const [lang, setLangState] = React.useState(window.getInitialLang());
  const setLang = (next) => { setLangState(next); window.persistLang(next); };
  const T = window.I18N[lang];

  return (
    <div style={{ width: '100%' }}>
      <Header fonts={FONTS} palette={PALETTE} lang={lang} setLang={setLang} />

      {/* Bloco de título */}
      <section style={{
        padding: '160px 40px 60px',
        borderBottom: '1px solid rgba(255,255,255,0.06)',
      }}>
        <div style={{
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.muted, marginBottom: 24,
          display: 'flex', gap: 16,
        }}>
          <span>{CAT.number}</span>
          <span style={{ color: PALETTE.accent }}>{CAT.subtitle}</span>
        </div>
        <h1 style={{
          fontFamily: FONTS.display,
          fontSize: 'clamp(56px, 9vw, 160px)',
          fontWeight: 300, lineHeight: 0.95, letterSpacing: '-0.04em', margin: 0,
        }}>
          {CAT.title}
        </h1>
        <p style={{
          marginTop: 32, maxWidth: 620,
          fontFamily: FONTS.sans, fontSize: 16, lineHeight: 1.7,
          color: 'rgba(245,241,232,0.78)',
        }}>
          {CAT.intro}
        </p>
      </section>

      {/* Grid de trabalhos */}
      <section style={{ padding: '60px 40px 100px' }}>
        {!hasWorks && (
          <div style={{
            fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
            textTransform: 'uppercase', color: 'rgba(245,241,232,0.4)', marginBottom: 32,
          }}>
            {T.category.worksBeingAdded}
          </div>
        )}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 28,
        }}>
          {hasWorks
            ? works.map((w, i) => (
                <WorkCard key={i} work={w} fonts={FONTS} palette={PALETTE} />
              ))
            : placeholders.map((i) => (
                <WorkCard key={i} placeholder fonts={FONTS} palette={PALETTE} />
              ))}
        </div>

        <a href="./color.html" style={{
          display: 'inline-block', marginTop: 56,
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.accent, textDecoration: 'none',
        }}>
          {T.backToColor}
        </a>
      </section>

      {/* Footer CTA — centralizado e branco */}
      <section style={{
        minHeight: '70vh',
        padding: '120px 40px',
        display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center',
        textAlign: 'center',
        borderTop: '1px solid rgba(255,255,255,0.06)',
      }}>
        <div style={{
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)', marginBottom: 32,
        }}>
          {T.contact.smallLabel}
        </div>
        <h2 style={{
          fontFamily: FONTS.display,
          fontSize: 'clamp(56px, 9vw, 160px)',
          fontWeight: 300, lineHeight: 0.95, letterSpacing: '-0.04em', margin: 0,
          maxWidth: 1200, color: '#fff',
        }}>
          {T.contact.headingA} <em style={{ fontStyle: 'italic' }}>{T.contact.headingB}</em>.
        </h2>
        <div style={{ marginTop: 40 }}>
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
            target="_blank" rel="noopener noreferrer"
            style={{
              display: 'inline-flex', alignItems: 'center', gap: 12,
              padding: '18px 28px',
              border: '1px solid #fff', color: '#fff',
              fontFamily: FONTS.mono, fontSize: 12, letterSpacing: '0.25em',
              textTransform: 'uppercase', textDecoration: 'none',
              transition: 'background 0.3s, color 0.3s',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = '#fff'; e.currentTarget.style.color = '#0a0a0a'; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#fff'; }}
          >
            jotapfilms@gmail.com <span>↗</span>
          </a>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
