<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jotap Films — Short-form</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; background: #0a0a0a; color: #f5f1e8; font-family: 'Inter', system-ui, sans-serif; }
  #root { width: 100%; }
  a { color: inherit; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<!-- Traduções compartilhadas (script normal, roda antes do Babel) -->
<script src="i18n.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const PALETTE = { bg: '#0a0a0a', fg: '#f5f1e8', muted: '#8a8580', accent: '#7a00d8' };
const FONTS = {
  display: '"Fraunces", serif',
  sans: '"Inter", system-ui, sans-serif',
  mono: '"JetBrains Mono", monospace',
};

const CF_CUSTOMER_CODE = 'customer-x1j6qmqmv38ltwyr';

// ════════════════════════════════════════════════════════════════
// VÍDEOS SHORT-FORM
// Cada item — 3 linhas de legenda + streamId:
//   title    → linha 1 (Fraunces italic) — nome do trabalho
//   subtitle → linha 2 (Inter, muted)    — cliente · projeto · contexto
//   meta     → linha 3 (mono, accent)    — ano · duração · plataforma
//   streamId → UID do Cloudflare Stream
// ════════════════════════════════════════════════════════════════
const SHORTFORM = [
  { title: 'Reel 01', subtitle: 'Cliente · Projeto', meta: '2026 · 00:42', streamId: '' },
  { title: 'Reel 02', subtitle: 'Cliente · Projeto', meta: '2026 · 00:36', streamId: '' },
  { title: 'Reel 03', subtitle: 'Cliente · Projeto', meta: '2026 · 00:58', streamId: '' },
  { title: 'Reel 04', subtitle: 'Cliente · Projeto', meta: '2025 · 00:30', streamId: '' },
  { title: 'Reel 05', subtitle: 'Cliente · Projeto', meta: '2025 · 01:12', streamId: '' },
  { title: 'Reel 06', subtitle: 'Cliente · Projeto', meta: '2025 · 00:45', streamId: '' },
  { title: 'Reel 07', subtitle: 'Cliente · Projeto', meta: '2025 · 00:24', streamId: '' },
  { title: 'Reel 08', subtitle: 'Cliente · Projeto', meta: '2024 · 00:50', streamId: '' },
  { title: 'Reel 09', subtitle: 'Cliente · Projeto', meta: '2024 · 00:38', streamId: '' },
];

// Imagem-poster gerada pelo Cloudflare Stream (thumbnail estático do grid)
function thumbUrl(id) {
  return `https://${CF_CUSTOMER_CODE}.cloudflarestream.com/${id}/thumbnails/thumbnail.jpg`;
}
// Player do lightbox — autoplay mudo, com controles (usuário desmuta)
function playerUrl(id) {
  return `https://${CF_CUSTOMER_CODE}.cloudflarestream.com/${id}/iframe?autoplay=true&muted=true&controls=true`;
}

function Header({ fonts, palette, lang, setLang }) {
  const N = window.I18N[lang].nav;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0,
      padding: '28px 40px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      fontFamily: fonts.mono, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase',
      color: '#fff', zIndex: 20, mixBlendMode: 'difference',
    }}>
      <a href="./index.html" style={{
        fontFamily: fonts.display, fontSize: 16, letterSpacing: '-0.02em',
        textTransform: 'none', fontStyle: 'italic', color: '#fff', textDecoration: 'none',
      }}>Jotap Films</a>

      {/* Toggle de idioma — centralizado no viewport */}
      <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', display: 'flex', alignItems: 'center', gap: 10 }}>
        <span onClick={() => setLang('en')} style={{ cursor: 'pointer', color: lang === 'en' ? palette.accent : 'inherit', opacity: lang === 'en' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>EN</span>
        <span style={{ opacity: 0.4 }}>·</span>
        <span onClick={() => setLang('pt')} style={{ cursor: 'pointer', color: lang === 'pt' ? palette.accent : 'inherit', opacity: lang === 'pt' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>PT</span>
      </div>

      <div style={{ display: 'flex', gap: 32 }}>
        <a href="./reel.html" style={{ color: 'inherit', textDecoration: 'none' }}>{N.reel}</a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
          target="_blank" rel="noopener noreferrer"
          style={{ color: 'inherit', textDecoration: 'none' }}>
          {N.contact}
        </a>
      </div>
    </div>
  );
}

// Card vertical 9:16 + 3 linhas de legenda. Clicável (abre lightbox).
function GridItem({ item, index, onOpen, fonts, palette }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={() => onOpen(index)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex',
        flexDirection: 'column',
        cursor: 'pointer',
      }}
    >
      {/* Thumbnail 9:16 */}
      <div style={{
        position: 'relative',
        aspectRatio: '9 / 16',
        background: `linear-gradient(135deg, ${palette.accent}33, ${palette.fg}11)`,
        overflow: 'hidden',
      }}>
        {item.streamId ? (
          <img
            src={thumbUrl(item.streamId)}
            alt={item.title}
            style={{
              position: 'absolute', inset: 0, width: '100%', height: '100%',
              objectFit: 'cover',
              transform: hover ? 'scale(1.05)' : 'scale(1)',
              transition: 'transform 0.5s cubic-bezier(0.2,0.8,0.2,1)',
            }}
          />
        ) : (
          <div style={{
            position: 'absolute', inset: 0,
            background: `repeating-linear-gradient(90deg, transparent, transparent 22px, ${palette.fg}08 22px, ${palette.fg}08 24px)`,
          }} />
        )}

        {/* Overlay escuro + play no hover */}
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: hover ? 'rgba(10,10,10,0.35)' : 'rgba(10,10,10,0)',
          transition: 'background 0.25s',
        }}>
          <div style={{
            width: 0, height: 0,
            borderLeft: `18px solid ${hover ? palette.accent : 'rgba(255,255,255,0.85)'}`,
            borderTop: '12px solid transparent',
            borderBottom: '12px solid transparent',
            marginLeft: 5,
            opacity: hover ? 1 : 0,
            transform: hover ? 'scale(1)' : 'scale(0.7)',
            transition: 'opacity 0.25s, transform 0.25s, border-color 0.25s',
          }} />
        </div>
      </div>

      {/* 3 linhas de legenda abaixo */}
      <div style={{
        marginTop: 12,
        display: 'flex',
        flexDirection: 'column',
        gap: 4,
      }}>
        {/* Linha 1 — título (Fraunces italic) */}
        <div style={{
          fontFamily: fonts.display,
          fontStyle: 'italic',
          fontSize: 14,
          lineHeight: 1.2,
          color: palette.fg,
        }}>
          {item.title || '—'}
        </div>
        {/* Linha 2 — subtítulo (Inter, muted) */}
        <div style={{
          fontFamily: fonts.sans,
          fontSize: 11,
          lineHeight: 1.4,
          color: palette.muted,
        }}>
          {item.subtitle || ''}
        </div>
        {/* Linha 3 — meta (mono, accent no hover) */}
        <div style={{
          fontFamily: fonts.mono,
          fontSize: 9,
          letterSpacing: '0.25em',
          textTransform: 'uppercase',
          color: hover ? palette.accent : 'rgba(245,241,232,0.4)',
          transition: 'color 0.25s',
        }}>
          {item.meta || ''}
        </div>
      </div>
    </div>
  );
}

// Lightbox — vídeo ampliado 9:16, fundo desfocado.
function Lightbox({ item, onClose, fonts }) {
  // Fecha com Esc
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 100,
        background: 'rgba(8,8,8,0.72)',
        backdropFilter: 'blur(28px)',
        WebkitBackdropFilter: 'blur(28px)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 40,
      }}
    >
      {/* Botão fechar */}
      <button
        onClick={onClose}
        style={{
          position: 'absolute', top: 24, right: 28,
          width: 40, height: 40, borderRadius: 20,
          border: '1px solid rgba(255,255,255,0.2)',
          background: 'transparent', color: '#fff',
          fontSize: 20, lineHeight: 1, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.2s',
        }}
        onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,0.12)')}
        onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
      >×</button>

      {/* Vídeo 9:16 ampliado — stopPropagation pra não fechar ao clicar nele */}
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          height: 'min(86vh, 1100px)',
          aspectRatio: '9 / 16',
          background: '#000',
          borderRadius: 4,
          overflow: 'hidden',
          boxShadow: '0 30px 90px rgba(0,0,0,0.6)',
        }}
      >
        {item.streamId ? (
          <iframe
            src={playerUrl(item.streamId)}
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
            allowFullScreen
            style={{ width: '100%', height: '100%', border: 'none' }}
          />
        ) : (
          <div style={{
            width: '100%', height: '100%',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexDirection: 'column', gap: 14,
            fontFamily: fonts.mono, fontSize: 11, letterSpacing: '0.25em',
            textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)',
            background: 'linear-gradient(135deg, #1a1a1a, #0a0a0a)',
          }}>
            <div style={{
              width: 0, height: 0,
              borderLeft: '22px solid #7a00d8',
              borderTop: '15px solid transparent',
              borderBottom: '15px solid transparent',
            }} />
            Sem streamId
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [openIndex, setOpenIndex] = useState(null);
  const [lang, setLangState] = useState(window.getInitialLang());
  const setLang = (next) => { setLangState(next); window.persistLang(next); };
  const T = window.I18N[lang];

  return (
    <div style={{ width: '100%' }}>
      <Header fonts={FONTS} palette={PALETTE} lang={lang} setLang={setLang} />

      {/* Bloco de título */}
      <section style={{
        padding: '160px 40px 50px',
      }}>
        <div style={{
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.accent, marginBottom: 24,
        }}>
          {T.shortform.smallLabel}
        </div>
        <h1 style={{
          fontFamily: FONTS.display,
          fontSize: 'clamp(56px, 9vw, 160px)',
          fontWeight: 300, lineHeight: 0.95, letterSpacing: '-0.04em', margin: 0,
        }}>
          {T.shortform.heading}
        </h1>
        <p style={{
          marginTop: 28, maxWidth: 560,
          fontFamily: FONTS.sans, fontSize: 15, lineHeight: 1.7,
          color: 'rgba(245,241,232,0.7)',
        }}>
          {T.shortform.intro}
        </p>
      </section>

      {/* Grid estilo Instagram — cards menores, auto-ajusta o número de colunas
          conforme a largura da tela (≈ 5–6 colunas em desktop wide). */}
      <section style={{ padding: '0 40px 80px' }}>
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))',
          // row gap maior pra dar espaço pras 3 linhas de texto; col gap apertado estilo IG
          rowGap: 36,
          columnGap: 6,
        }}>
          {SHORTFORM.map((item, i) => (
            <GridItem
              key={i}
              item={item}
              index={i}
              onOpen={setOpenIndex}
              fonts={FONTS}
              palette={PALETTE}
            />
          ))}
        </div>

        <a href="./reel.html" style={{
          display: 'inline-block', marginTop: 48,
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.accent, textDecoration: 'none',
        }}>
          {T.backToReel}
        </a>
      </section>

      {/* Lightbox */}
      {openIndex !== null && (
        <Lightbox
          item={SHORTFORM[openIndex]}
          onClose={() => setOpenIndex(null)}
          fonts={FONTS}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
