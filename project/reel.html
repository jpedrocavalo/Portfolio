<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jotap Films — Reel</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; background: #0a0a0a; color: #f5f1e8; }
  #root { width: 100%; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<!-- Traduções compartilhadas + lista de vídeos (scripts normais, antes do Babel) -->
<script src="i18n.js"></script>
<script src="videos.js"></script>

<script type="text/babel" src="heroes/color-reveal-bg.jsx"></script>
<script type="text/babel" src="heroes/v1-showreel.jsx"></script>

<script type="text/babel">
const PALETTE = { bg: '#0a0a0a', fg: '#f5f1e8', muted: '#8a8580', accent: '#7a00d8' };
const FONTS = {
  display: '"Fraunces", serif',
  sans: '"Inter", system-ui, sans-serif',
  mono: '"JetBrains Mono", monospace',
};

const { useState, useEffect } = React;

const sectionStyle = {
  minHeight: '100vh',
  width: '100%',
  display: 'flex',
  alignItems: 'center',
  justifyContent: 'center',
  padding: '80px 40px',
  borderTop: '1px solid rgba(255,255,255,0.06)',
};

const labelStyle = {
  fontFamily: FONTS.mono,
  fontSize: 11,
  letterSpacing: '0.3em',
  textTransform: 'uppercase',
  color: 'rgba(245,241,232,0.35)',
};

// ────────────────────────────────────────────────────────────────
// CLOUDFLARE STREAM
// Substitua pelo seu Customer Code (encontra no painel do Stream)
// Cada vídeo precisa do streamId — copie do painel após o upload
// ────────────────────────────────────────────────────────────────
const CF_CUSTOMER_CODE = 'customer-x1j6qmqmv38ltwyr';

// Grid "Selected Works" = todos os vídeos de videos.js (cada um clicável,
// leva pra ./video.html?v=<índice>) + o card Short-form no final.
const FEATURED = [
  ...window.VIDEOS.map((v, i) => ({ ...v, href: './video.html?v=' + i })),
  { title: 'Short-form ↗', duration: '', imageSrc: '', href: './short-form.html' },
];

// ID do vídeo do hero (fundo) — deixe vazio pra usar o MP4 local "./reel.mp4"
const HERO_STREAM_ID = '';

// Último vídeo = índice 0 de videos.js — alimenta o mini-card da hero.
const LATEST_VIDEO = window.VIDEOS[0];

// Helper — URL do iframe do Cloudflare Stream (hero / player)
function streamUrl(id) {
  const params = 'autoplay=true&muted=true&loop=true&controls=false&preload=auto';
  return `https://${CF_CUSTOMER_CODE}.cloudflarestream.com/${id}/iframe?${params}`;
}

// Helper — thumbnail estático do Cloudflare Stream (usado nos cards do grid)
function thumbUrl(id) {
  return `https://${CF_CUSTOMER_CODE}.cloudflarestream.com/${id}/thumbnails/thumbnail.jpg`;
}

const COLS = 3;
const ROWS = 2;
const LABEL_TO_GRID = 24;
const GRID_GAP = 24;

// Card — exibe thumbnail estático (mais leve no grid).
// fill=true → preenche o container; false → usa aspectRatio 16:9.
function Card({ data, fonts, palette, fill }) {
  const hasMedia = data.streamId || data.videoSrc || data.imageSrc;
  return (
    <div style={{
      width: '100%',
      height: fill ? '100%' : 'auto',
      display: 'flex',
      flexDirection: 'column',
    }}>
      <div style={{
        position: 'relative',
        flex: fill ? 1 : 'none',
        aspectRatio: fill ? 'auto' : '16 / 9',
        background: `linear-gradient(135deg, ${palette.accent}33, ${palette.fg}11)`,
        borderRadius: 2,
        overflow: 'hidden',
        border: `1px solid ${palette.fg}1a`,
      }}>
        {data.streamId ? (
          <img
            src={thumbUrl(data.streamId)}
            alt={data.title}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }}
          />
        ) : data.videoSrc ? (
          <video src={data.videoSrc} autoPlay muted loop playsInline
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
        ) : data.imageSrc ? (
          <img src={data.imageSrc} alt={data.title}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
        ) : (
          <>
            <div style={{
              position: 'absolute', inset: 0,
              background: `repeating-linear-gradient(90deg, transparent, transparent 28px, ${palette.fg}08 28px, ${palette.fg}08 30px)`,
            }} />
            <div style={{
              position: 'absolute', inset: '24% 35%',
              border: `1px solid ${palette.accent}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <div style={{
                width: 0, height: 0,
                borderLeft: `14px solid ${palette.accent}`,
                borderTop: '9px solid transparent',
                borderBottom: '9px solid transparent',
                marginLeft: 4,
              }} />
            </div>
          </>
        )}
      </div>
      <div style={{ marginTop: 10, display: 'flex', justifyContent: 'space-between', fontSize: 13, flexShrink: 0 }}>
        <span style={{ fontFamily: fonts.display, fontStyle: 'italic' }}>{data.title}</span>
        <span style={{ fontFamily: fonts.mono, color: palette.muted, fontSize: 10 }}>{data.duration}</span>
      </div>
    </div>
  );
}


function App() {
  // Idioma vem de i18n.js — toggle no header da hero.
  const [lang, setLangState] = React.useState(window.getInitialLang());
  const setLang = (next) => { setLangState(next); window.persistLang(next); };
  const T = window.I18N[lang];

  // Detecta mobile pra ajustar o grid de Selected Works
  const [isMobile, setIsMobile] = React.useState(false);
  React.useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 768);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);

  // No mobile: só os 3 primeiros vídeos. No desktop: tudo (5 vídeos + Short-form).
  const featuredItems = isMobile ? FEATURED.slice(0, 4) : FEATURED;

  return (
    <div style={{ width: '100%' }}>

      {/* Header fixo — desktop e mobile */}
      <div style={{
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 20,
        padding: isMobile ? '20px 20px' : '28px 40px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase',
        color: '#fff', mixBlendMode: 'difference',
      }}>
        <a href="./index.html" style={{
          fontFamily: FONTS.display, fontSize: 16, letterSpacing: '-0.02em',
          textTransform: 'none', fontStyle: 'italic', color: '#fff', textDecoration: 'none',
        }}>Jotap Films</a>

        <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', display: 'flex', alignItems: 'center', gap: 10 }}>
          <span onClick={() => setLang('en')} style={{ cursor: 'pointer', color: lang === 'en' ? PALETTE.accent : 'inherit', opacity: lang === 'en' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>EN</span>
          <span style={{ opacity: 0.4 }}>·</span>
          <span onClick={() => setLang('pt')} style={{ cursor: 'pointer', color: lang === 'pt' ? PALETTE.accent : 'inherit', opacity: lang === 'pt' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>PT</span>
        </div>

        <div style={{ display: 'flex', gap: isMobile ? 20 : 32 }}>
          <a href="./index.html" style={{ color: 'inherit', textDecoration: 'none' }}>{T.nav.about}</a>
          {!isMobile && (
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
              target="_blank" rel="noopener noreferrer"
              style={{ color: 'inherit', textDecoration: 'none' }}>{T.nav.contact}
            </a>
          )}
        </div>
      </div>

      {/* Hero — gancho de texto, sem vídeo, centralizado */}
      <section style={{
        minHeight: isMobile ? '55vh' : '65vh',
        padding: isMobile ? '100px 20px 48px' : '160px 40px 64px',
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'center',
        alignItems: 'center',
        textAlign: 'center',
        borderBottom: '1px solid rgba(255,255,255,0.06)',
      }}>
        <div style={{
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.muted, marginBottom: 20,
        }}>
          {T.reel.heroLabel}
        </div>
        <h1 style={{
          fontFamily: FONTS.display,
          fontSize: isMobile ? 'clamp(52px, 16vw, 80px)' : 'clamp(80px, 12vw, 180px)',
          fontWeight: 300, lineHeight: 0.9, letterSpacing: '-0.04em', margin: 0,
        }}>
          Jotap<br />
          <em style={{ fontStyle: 'italic', color: PALETTE.accent }}>Films.</em>
        </h1>
        <p style={{
          fontFamily: FONTS.sans, fontSize: isMobile ? 13 : 15, lineHeight: 1.6,
          color: 'rgba(245,241,232,0.6)', margin: '28px 0 0', maxWidth: 480,
        }}>
          {T.reel.heroDescription}
        </p>
        <a href="#selected" style={{
          marginTop: isMobile ? 28 : 36,
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.accent, textDecoration: 'none',
        }}>
          {T.reel.selectedWorks} ↓
        </a>
      </section>

      {/* Selected Works — 100vh com 6 cards num grid 3×2, já no lugar (sem animação) */}
      <section id="selected" style={{
        height: isMobile ? 'auto' : '100vh',
        width: '100%',
        padding: isMobile ? '40px 20px' : 40,
        display: 'flex',
        flexDirection: 'column',
        borderTop: '1px solid rgba(255,255,255,0.06)',
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <div style={labelStyle}>{T.reel.selectedWorks}</div>
          <a href="./works.html" style={{
            ...labelStyle,
            color: PALETTE.accent,
            textDecoration: 'none',
            transition: 'opacity 0.2s',
          }}
          onMouseEnter={(e) => (e.currentTarget.style.opacity = 0.6)}
          onMouseLeave={(e) => (e.currentTarget.style.opacity = 1)}
          >
            {T.reel.seeAll}
          </a>
        </div>
        <div style={{
          flex: 1,
          marginTop: LABEL_TO_GRID,
          display: 'grid',
          // Mobile: 2 colunas, 2 fileiras (4 cards). Desktop: 3×2.
          gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : `repeat(${COLS}, 1fr)`,
          gridTemplateRows:    isMobile ? 'repeat(2, 1fr)' : `repeat(${ROWS}, 1fr)`,
          gap: GRID_GAP,
        }}>
          {featuredItems.map((data, i) => (
            data.href ? (
              <a key={i} href={data.href} style={{
                display: 'flex',
                flexDirection: 'column',
                textDecoration: 'none',
                color: 'inherit',
                cursor: 'pointer',
              }}>
                <Card data={data} fonts={FONTS} palette={PALETTE} fill />
              </a>
            ) : (
              <Card key={i} data={data} fonts={FONTS} palette={PALETTE} fill />
            )
          ))}
        </div>

        {/* Mobile: link extra pra Short-form (no desktop o card já está no grid) */}
        {isMobile && (
          <a href="./short-form.html" style={{
            marginTop: 18,
            alignSelf: 'flex-end',
            fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
            textTransform: 'uppercase', color: PALETTE.accent,
            textDecoration: 'none',
          }}>
            Short-form ↗
          </a>
        )}
      </section>


      {/* Footer CTA — centralizado e branco */}
      <section id="contact" style={{
        minHeight: '60vh',
        padding: isMobile ? '80px 20px' : '120px 40px',
        display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center',
        textAlign: 'center',
      }}>
        <div style={{
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)', marginBottom: 24,
        }}>
          {T.contact.smallLabel}
        </div>
        <h2 style={{
          fontFamily: FONTS.display,
          fontSize: isMobile ? 'clamp(48px, 14vw, 80px)' : 'clamp(56px, 9vw, 160px)',
          fontWeight: 300, lineHeight: 0.95, letterSpacing: '-0.04em', margin: 0,
          maxWidth: 1200,
          color: '#fff',
        }}>
          {T.contact.headingA} <em style={{ fontStyle: 'italic' }}>{T.contact.headingB}</em>.
        </h2>
        <div style={{ marginTop: 36, display: 'flex', flexDirection: isMobile ? 'column' : 'row', gap: isMobile ? 16 : 32, alignItems: 'center', justifyContent: 'center' }}>
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
            target="_blank" rel="noopener noreferrer"
            style={{
              display: 'inline-flex', alignItems: 'center', gap: 12,
              padding: isMobile ? '14px 20px' : '18px 28px',
              border: '1px solid #fff',
              color: '#fff',
              fontFamily: FONTS.mono, fontSize: isMobile ? 10 : 12, letterSpacing: '0.2em',
              textTransform: 'uppercase', textDecoration: 'none',
              transition: 'background 0.3s, color 0.3s',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = '#fff'; e.currentTarget.style.color = '#0a0a0a'; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#fff'; }}
          >
            jotapfilms@gmail.com <span>↗</span>
          </a>
          <div style={{ fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.25em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)' }}>
            {T.contact.openFor}
          </div>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
