<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jotap Films — All works</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; background: #0a0a0a; color: #f5f1e8; font-family: 'Inter', system-ui, sans-serif; }
  #root { width: 100%; }
  a { color: inherit; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<!-- Traduções compartilhadas + lista de vídeos (scripts normais, antes do Babel) -->
<script src="i18n.js"></script>
<script src="videos.js"></script>

<script type="text/babel">
const { useState } = React;

const PALETTE = { bg: '#0a0a0a', fg: '#f5f1e8', muted: '#8a8580', accent: '#7a00d8' };
const FONTS = {
  display: '"Fraunces", serif',
  sans: '"Inter", system-ui, sans-serif',
  mono: '"JetBrains Mono", monospace',
};

const CF_CUSTOMER_CODE = 'customer-x1j6qmqmv38ltwyr';
const VIDEOS = window.VIDEOS || [];

// Thumbnail estático do Cloudflare Stream
function thumbUrl(id) {
  return `https://${CF_CUSTOMER_CODE}.cloudflarestream.com/${id}/thumbnails/thumbnail.jpg`;
}

function Header({ fonts, palette, lang, setLang }) {
  const N = window.I18N[lang].nav;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0,
      padding: '28px 40px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      fontFamily: fonts.mono, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase',
      color: '#fff', zIndex: 10, mixBlendMode: 'difference',
    }}>
      <a href="./index.html" style={{
        fontFamily: fonts.display, fontSize: 16, letterSpacing: '-0.02em',
        textTransform: 'none', fontStyle: 'italic', color: '#fff', textDecoration: 'none',
      }}>Jotap Films</a>

      {/* Toggle de idioma — centralizado no viewport */}
      <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', display: 'flex', alignItems: 'center', gap: 10 }}>
        <span onClick={() => setLang('en')} style={{ cursor: 'pointer', color: lang === 'en' ? palette.accent : 'inherit', opacity: lang === 'en' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>EN</span>
        <span style={{ opacity: 0.4 }}>·</span>
        <span onClick={() => setLang('pt')} style={{ cursor: 'pointer', color: lang === 'pt' ? palette.accent : 'inherit', opacity: lang === 'pt' ? 1 : 0.55, transition: 'opacity 0.2s, color 0.2s' }}>PT</span>
      </div>

      <div style={{ display: 'flex', gap: 32 }}>
        <a href="./color.html" style={{ color: 'inherit', textDecoration: 'none' }}>{N.color}</a>
        <a href="./reel.html" style={{ color: 'inherit', textDecoration: 'none' }}>{N.reel}</a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
          target="_blank" rel="noopener noreferrer"
          style={{ color: 'inherit', textDecoration: 'none' }}>
          {N.contact}
        </a>
      </div>
    </div>
  );
}

function VideoCard({ video, index, fonts, palette }) {
  const [hover, setHover] = useState(false);
  return (
    <a
      href={`./video.html?v=${index}`}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', flexDirection: 'column',
        textDecoration: 'none', color: 'inherit', cursor: 'pointer',
      }}
    >
      <div style={{
        position: 'relative',
        aspectRatio: '16 / 9',
        background: `linear-gradient(135deg, ${palette.accent}22, ${palette.fg}08)`,
        border: `1px solid ${hover ? palette.accent : palette.fg + '1a'}`,
        overflow: 'hidden',
        transition: 'border-color 0.25s',
      }}>
        {video.streamId ? (
          <img
            src={thumbUrl(video.streamId)}
            alt={video.title}
            style={{
              position: 'absolute', inset: 0, width: '100%', height: '100%',
              objectFit: 'cover',
              transform: hover ? 'scale(1.04)' : 'scale(1)',
              transition: 'transform 0.5s cubic-bezier(0.2,0.8,0.2,1)',
            }}
          />
        ) : (
          <>
            <div style={{
              position: 'absolute', inset: 0,
              background: `repeating-linear-gradient(90deg, transparent, transparent 24px, ${palette.fg}08 24px, ${palette.fg}08 26px)`,
            }} />
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <div style={{
                width: 0, height: 0,
                borderLeft: `14px solid ${palette.accent}`,
                borderTop: '9px solid transparent',
                borderBottom: '9px solid transparent',
                marginLeft: 4,
              }} />
            </div>
          </>
        )}
      </div>
      <div style={{
        marginTop: 12,
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'baseline',
        gap: 12,
      }}>
        <span style={{
          fontFamily: fonts.display, fontStyle: 'italic',
          fontSize: 15, color: palette.fg,
        }}>
          {video.title}
        </span>
        <span style={{
          fontFamily: fonts.mono, fontSize: 10, letterSpacing: '0.2em',
          color: palette.muted, flexShrink: 0,
        }}>
          {video.duration}
        </span>
      </div>
      {(video.year || video.category) && (
        <div style={{
          marginTop: 4,
          fontFamily: fonts.mono, fontSize: 10, letterSpacing: '0.2em',
          textTransform: 'uppercase', color: 'rgba(245,241,232,0.4)',
        }}>
          {[video.year, video.category].filter(Boolean).join(' · ')}
        </div>
      )}
    </a>
  );
}

function App() {
  const [lang, setLangState] = React.useState(window.getInitialLang());
  const setLang = (next) => { setLangState(next); window.persistLang(next); };
  const T = window.I18N[lang];
  return (
    <div style={{ width: '100%' }}>
      <Header fonts={FONTS} palette={PALETTE} lang={lang} setLang={setLang} />

      {/* Bloco de título */}
      <section style={{
        padding: '160px 40px 60px',
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          flexWrap: 'wrap', gap: 16,
        }}>
          <div>
            <div style={{
              fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
              textTransform: 'uppercase', color: PALETTE.accent, marginBottom: 24,
            }}>
              {T.works.allWorks}
            </div>
            <h1 style={{
              fontFamily: FONTS.display,
              fontSize: 'clamp(56px, 9vw, 160px)',
              fontWeight: 300, lineHeight: 0.95, letterSpacing: '-0.04em', margin: 0,
            }}>
              {T.works.heading}
            </h1>
          </div>
          <div style={{
            fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
            textTransform: 'uppercase', color: PALETTE.muted,
          }}>
            {VIDEOS.length} {VIDEOS.length === 1 ? T.works.projectSingular : T.works.projectPlural}
          </div>
        </div>
      </section>

      {/* Grid de todos os vídeos */}
      <section style={{ padding: '20px 40px 80px' }}>
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))',
          gap: 28,
        }}>
          {VIDEOS.map((v, i) => (
            <VideoCard key={i} video={v} index={i} fonts={FONTS} palette={PALETTE} />
          ))}
        </div>

        <a href="./reel.html" style={{
          display: 'inline-block', marginTop: 56,
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: PALETTE.accent, textDecoration: 'none',
        }}>
          {T.backToReel}
        </a>
      </section>

      {/* Footer CTA */}
      <section style={{
        minHeight: '70vh',
        padding: '120px 40px',
        display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center',
        textAlign: 'center',
        borderTop: '1px solid rgba(255,255,255,0.06)',
      }}>
        <div style={{
          fontFamily: FONTS.mono, fontSize: 11, letterSpacing: '0.3em',
          textTransform: 'uppercase', color: 'rgba(255,255,255,0.5)', marginBottom: 32,
        }}>
          {T.contact.smallLabel}
        </div>
        <h2 style={{
          fontFamily: FONTS.display,
          fontSize: 'clamp(56px, 9vw, 160px)',
          fontWeight: 300, lineHeight: 0.95, letterSpacing: '-0.04em', margin: 0,
          maxWidth: 1200, color: '#fff',
        }}>
          {T.contact.headingA} <em style={{ fontStyle: 'italic' }}>{T.contact.headingB}</em>.
        </h2>
        <div style={{ marginTop: 40 }}>
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jotapfilms@gmail.com"
            target="_blank" rel="noopener noreferrer"
            style={{
              display: 'inline-flex', alignItems: 'center', gap: 12,
              padding: '18px 28px',
              border: '1px solid #fff', color: '#fff',
              fontFamily: FONTS.mono, fontSize: 12, letterSpacing: '0.25em',
              textTransform: 'uppercase', textDecoration: 'none',
              transition: 'background 0.3s, color 0.3s',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = '#fff'; e.currentTarget.style.color = '#0a0a0a'; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#fff'; }}
          >
            jotapfilms@gmail.com <span>↗</span>
          </a>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
